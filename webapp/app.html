<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Data Agent - Short Videos Only</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_BASE = 'http://localhost:5000/api';
        const WS_URL = 'http://localhost:5000';

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [stats, setStats] = useState(null);
            const [jobs, setJobs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [socket, setSocket] = useState(null);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const ws = io(WS_URL);
                ws.on('connect', () => {
                    console.log('WebSocket connected');
                    addMessage('system', '✓ Connected to server');
                });
                ws.on('log', (data) => {
                    addMessage('system', data.message, data.level);
                });
                ws.on('job_update', (job) => {
                    updateJob(job);
                });
                setSocket(ws);
                
                return () => ws.disconnect();
            }, []);

            useEffect(() => {
                fetchStats();
                fetchJobs();
                const interval = setInterval(() => {
                    fetchStats();
                    fetchJobs();
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const fetchStats = async () => {
                try {
                    const res = await fetch(`${API_BASE}/stats`);
                    const data = await res.json();
                    setStats(data);
                } catch (err) {
                    console.error('Failed to fetch stats:', err);
                }
            };

            const fetchJobs = async () => {
                try {
                    const res = await fetch(`${API_BASE}/jobs`);
                    const data = await res.json();
                    setJobs(data);
                } catch (err) {
                    console.error('Failed to fetch jobs:', err);
                }
            };

            const addMessage = (role, content, level = 'info') => {
                setMessages(prev => [...prev, { role, content, level, timestamp: new Date() }]);
            };

            const updateJob = (job) => {
                setJobs(prev => {
                    const idx = prev.findIndex(j => j.id === job.id);
                    if (idx >= 0) {
                        const updated = [...prev];
                        updated[idx] = job;
                        return updated;
                    }
                    return [...prev, job];
                });
            };

            const sendMessage = async () => {
                if (!input.trim()) return;

                const userMessage = input;
                setInput('');
                addMessage('user', userMessage);
                setLoading(true);

                try {
                    const res = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMessage })
                    });
                    const command = await res.json();

                    if (command.action === 'chat') {
                        addMessage('bot', command.response);
                    } else if (command.action === 'stats') {
                        await fetchStats();
                        addMessage('bot', 'Here are the current dataset statistics:');
                    } else if (['search', 'download', 'channel'].includes(command.action)) {
                        const jobRes = await fetch(`${API_BASE}/process`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(command)
                        });
                        const jobData = await jobRes.json();
                        
                        addMessage('bot', `Started job ${jobData.job_id}. Processing videos (30s-10min)...`);
                        socket?.emit('subscribe_job', { job_id: jobData.job_id });
                        await fetchJobs();
                    }
                } catch (err) {
                    addMessage('bot', `Error: ${err.message}`, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const downloadDataset = () => {
                window.open(`${API_BASE}/download/dataset`, '_blank');
                addMessage('system', '📦 Downloading entire dataset...');
            };

            return (
                <div className="min-h-screen flex">
                    {/* Sidebar */}
                    <div className="w-80 bg-white border-r border-gray-200 p-6 flex flex-col">
                        <div className="mb-8">
                            <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2">
                                <i className="fas fa-video text-blue-600"></i>
                                Vision Data Agent
                            </h1>
                            <p className="text-sm text-gray-600 mt-1">Short-to-Medium Videos (30s-10min)</p>
                        </div>

                        {/* Stats */}
                        <div className="mb-6">
                            <div className="flex items-center justify-between mb-3">
                                <h2 className="text-sm font-semibold text-gray-700">Dataset Stats</h2>
                                <button
                                    onClick={downloadDataset}
                                    className="text-xs px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700"
                                    title="Download entire dataset"
                                >
                                    <i className="fas fa-download"></i>
                                </button>
                            </div>
                            {stats ? (
                                <div className="space-y-2">
                                    <StatItem icon="video" label="Videos" value={stats.total_videos} />
                                    <StatItem icon="images" label="Frames" value={stats.total_frames} />
                                    <StatItem icon="face-smile" label="Faces" value={stats.total_faces} />
                                </div>
                            ) : (
                                <p className="text-sm text-gray-500">Loading...</p>
                            )}
                        </div>

                        {/* Jobs */}
                        <div className="flex-1 overflow-auto">
                            <h2 className="text-sm font-semibold text-gray-700 mb-3">Recent Jobs</h2>
                            <div className="space-y-2">
                                {jobs.slice(0, 10).map(job => (
                                    <JobCard key={job.id} job={job} />
                                ))}
                                {jobs.length === 0 && (
                                    <p className="text-sm text-gray-500">No jobs yet</p>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-1 flex flex-col">
                        {/* Messages */}
                        <div className="flex-1 overflow-auto p-6 space-y-4">
                            {messages.length === 0 && (
                                <div className="text-center text-gray-500 mt-20">
                                    <i className="fas fa-comment-dots text-5xl mb-4 text-gray-300"></i>
                                    <p className="text-lg">Start a conversation!</p>
                                    <p className="text-sm mt-2 text-gray-600">
                                        🎬 Processes videos 30 seconds to 10 minutes long
                                    </p>
                                    <p className="text-sm mt-1">Try: "Search for 5 videos about AI"</p>
                                </div>
                            )}
                            {messages.map((msg, i) => (
                                <Message key={i} message={msg} />
                            ))}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input */}
                        <div className="border-t border-gray-200 p-6 bg-white">
                            <div className="flex gap-3">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                    placeholder="Type a message... (e.g., 'Search for short videos about misinformation')"
                                    className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    disabled={loading}
                                />
                                <button
                                    onClick={sendMessage}
                                    disabled={loading || !input.trim()}
                                    className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
                                >
                                    {loading ? (
                                        <i className="fas fa-spinner fa-spin"></i>
                                    ) : (
                                        <i className="fas fa-paper-plane"></i>
                                    )}
                                </button>
                            </div>
                            <p className="text-xs text-gray-500 mt-2">
                                🎬 Videos 30s-10min • Powered by Google Gemini
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        function StatItem({ icon, label, value }) {
            return (
                <div className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div className="flex items-center gap-2">
                        <i className={`fas fa-${icon} text-gray-400`}></i>
                        <span className="text-sm text-gray-700">{label}</span>
                    </div>
                    <span className="text-sm font-semibold text-gray-900">{value}</span>
                </div>
            );
        }

        function JobCard({ job }) {
            const statusColors = {
                queued: 'bg-gray-100 text-gray-700',
                running: 'bg-blue-100 text-blue-700',
                completed: 'bg-green-100 text-green-700',
                failed: 'bg-red-100 text-red-700'
            };

            const downloadFrames = (videoId) => {
                window.open(`${API_BASE}/download/frames/${videoId}`, '_blank');
            };

            const downloadFaces = (videoId) => {
                window.open(`${API_BASE}/download/faces/${videoId}`, '_blank');
            };

            return (
                <div className="p-3 bg-gray-50 rounded-lg text-sm">
                    <div className="flex items-center justify-between mb-1">
                        <span className="font-medium text-gray-900 truncate">{job.id}</span>
                        <span className={`px-2 py-1 rounded text-xs font-medium ${statusColors[job.status]}`}>
                            {job.status}
                        </span>
                    </div>
                    
                    {job.current_step && (
                        <div className="text-xs text-gray-600 mb-2">
                            {job.current_step}
                        </div>
                    )}
                    
                    {job.status === 'running' && (
                        <div className="w-full bg-gray-200 rounded-full h-2 mt-2">
                            <div 
                                className="bg-blue-600 h-2 rounded-full transition-all duration-300"
                                style={{ width: `${job.progress || 0}%` }}
                            ></div>
                        </div>
                    )}
                    
                    {job.status === 'completed' && (
                        <div className="flex gap-1 mt-2">
                            <button
                                onClick={() => downloadFrames(job.id)}
                                className="flex-1 px-2 py-1 text-xs bg-blue-50 text-blue-700 rounded hover:bg-blue-100"
                                title="Download frames"
                            >
                                <i className="fas fa-images mr-1"></i>
                                Frames
                            </button>
                            <button
                                onClick={() => downloadFaces(job.id)}
                                className="flex-1 px-2 py-1 text-xs bg-purple-50 text-purple-700 rounded hover:bg-purple-100"
                                title="Download faces"
                            >
                                <i className="fas fa-user mr-1"></i>
                                Faces
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function Message({ message }) {
            const isUser = message.role === 'user';
            const isSystem = message.role === 'system';

            if (isSystem) {
                return (
                    <div className="text-center">
                        <span className={`text-xs px-3 py-1 rounded-full ${
                            message.level === 'error' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-600'
                        }`}>
                            {message.content}
                        </span>
                    </div>
                );
            }

            return (
                <div className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-2xl px-4 py-3 rounded-lg ${
                        isUser 
                            ? 'bg-blue-600 text-white' 
                            : 'bg-white border border-gray-200 text-gray-900'
                    }`}>
                        {message.content}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
